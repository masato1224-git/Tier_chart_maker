<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Flask Tier Maker - 設定</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f0f2f5; }
        .form-group { margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        label { display: inline-block; width: 120px; font-weight: bold; }
        input[type="text"], input[type="color"], input[type="file"], input[type="range"] { padding: 5px; }
        button { padding: 10px 20px; font-size: 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #45a049; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>Tier表メーカー - ステップ1: 設定</h1>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>タイトル:</label>
            <input type="text" name="title" value="{{ title }}" required>
            <label>色:</label>
            <input type="color" name="title_color" value="{{ title_color }}">
            <label>太さ:</label>
            <input type="range" name="title_weight" id="title_weight" min="0" max="10" value="{{ title_weight }}">
            <span id="title_weight_value">{{ title_weight }}</span>
            <label>サイズ:</label>
            <input type="range" name="title_size" id="title_size" min="16" max="72" value="{{ title_size }}">
            <span id="title_size_value">{{ title_size }}</span>px
        </div>
        
        
        <div class="form-group">
            <label>縦軸ラベル:</label>
            <input type="text" name="y_label" value="{{ y_label }}">
            <label>色:</label>
            <input type="color" name="y_color" value="{{ y_color }}">
            <label>太さ:</label>
            <input type="range" name="y_weight" id="y_weight" min="0" max="10" value="{{ y_weight }}">
            <span id="y_weight_value">{{ y_weight }}</span>
            <label>サイズ:</label>
            <input type="range" name="y_size" id="y_size" min="16" max="72" value="{{ y_size }}">
            <span id="y_size_value">{{ y_size }}</span>px
        </div>

        <div class="form-group">
            <label>横軸ラベル:</label>
            <input type="text" name="x_label" value="{{ x_label }}">
            <label>色:</label>
            <input type="color" name="x_color" value="{{ x_color }}">
            <label>太さ:</label>
            <input type="range" name="x_weight" id="x_weight" min="0" max="10" value="{{ x_weight }}">
            <span id="x_weight_value">{{ x_weight }}</span>
            <label>サイズ:</label>
            <input type="range" name="x_size" id="x_size" min="16" max="72" value="{{ x_size }}">
            <span id="x_size_value">{{ x_size }}</span>px
        </div>
        <div class="form-group">
            <label>背景画像:</label>
            <input type="file" name="bg_file" accept="image/*">
        </div>
        <button type="submit">次へ進む → 画像配置ページ</button>
    </form>
    <script>
        // タイトル設定の値表示更新
        const titleWeightInput = document.getElementById('title_weight');
        const titleWeightValue = document.getElementById('title_weight_value');
        const titleSizeInput = document.getElementById('title_size');
        const titleSizeValue = document.getElementById('title_size_value');
        
        // 縦軸設定の値表示更新
        const yWeightInput = document.getElementById('y_weight');
        const yWeightValue = document.getElementById('y_weight_value');
        const ySizeInput = document.getElementById('y_size');
        const ySizeValue = document.getElementById('y_size_value');
        
        // 横軸設定の値表示更新
        const xWeightInput = document.getElementById('x_weight');
        const xWeightValue = document.getElementById('x_weight_value');
        const xSizeInput = document.getElementById('x_size');
        const xSizeValue = document.getElementById('x_size_value');

        // イベントリスナーの設定
        titleWeightInput.addEventListener('input', () => {
            titleWeightValue.textContent = titleWeightInput.value;
        });
        titleSizeInput.addEventListener('input', () => {
            titleSizeValue.textContent = titleSizeInput.value;
        });
        yWeightInput.addEventListener('input', () => {
            yWeightValue.textContent = yWeightInput.value;
        });
        ySizeInput.addEventListener('input', () => {
            ySizeValue.textContent = ySizeInput.value;
        });
        xWeightInput.addEventListener('input', () => {
            xWeightValue.textContent = xWeightInput.value;
        });
        xSizeInput.addEventListener('input', () => {
            xSizeValue.textContent = xSizeInput.value;
        });
    </script>
</body>
</html>

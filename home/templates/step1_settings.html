<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Flask Tier Maker - 設定</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f0f2f5; }
        .form-group { margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        label { display: inline-block; width: 120px; font-weight: bold; }
        input[type="text"], input[type="color"], input[type="file"], input[type="range"] { padding: 5px; }
        button { padding: 10px 20px; font-size: 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #45a049; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>Tier表メーカー - ステップ1: 設定</h1>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>タイトル:</label>
            <input type="text" name="title" value="{{ title }}" required>
            <label>色:</label>
            <input type="color" name="title_color" value="{{ title_color }}">
        </div>
        <div class="form-group">
            <label>文字の太さ:</label>
            <input type="range" name="text_weight" id="text_weight" min="0" max="10" value="{{ text_weight }}">
            <span id="text_weight_value">{{ text_weight }}</span>
        </div>
        <div class="form-group">
            <label>文字サイズ:</label>
            <input type="range" name="text_size" id="text_size" min="16" max="72" value="{{ text_size }}">
            <span id="text_size_value">{{ text_size }}</span>px
        </div>
        <div class="form-group">
            <label>縦軸ラベル:</label>
            <input type="text" name="y_label" value="{{ y_label }}">
            <label>色:</label>
            <input type="color" name="y_color" value="{{ y_color }}">
        </div>

        <div class="form-group">
            <label>横軸ラベル:</label>
            <input type="text" name="x_label" value="{{ x_label }}">
            <label>色:</label>
            <input type="color" name="x_color" value="{{ x_color }}">
        </div>
        <div class="form-group">
            <label>背景画像:</label>
            <input type="file" name="bg_file" accept="image/*">
        </div>
        <button type="submit">次へ進む → 画像配置ページ</button>
    </form>
    <script>
        const weightInput = document.getElementById('text_weight');
        const weightValue = document.getElementById('text_weight_value');
        const sizeInput = document.getElementById('text_size');
        const sizeValue = document.getElementById('text_size_value');

        weightInput.addEventListener('input', () => {
            weightValue.textContent = weightInput.value;
        });
        sizeInput.addEventListener('input', () => {
            sizeValue.textContent = sizeInput.value;
        });
    </script>
</body>
</html>

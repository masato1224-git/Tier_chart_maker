<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Flask Tier Maker</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f0f2f5; }
        .form-group { margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        label { display: inline-block; width: 120px; }
        .preview { margin-top: 20px; border: 2px solid #333; max-width: 100%; }
    </style>
</head>
<body>
    <h1>Tier表メーカー</h1>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>タイトル:</label>
            <input type="text" name="title" value="My Best Games">
            <input type="color" name="title_color" value="#ffffff">
        </div>
        <div class="form-group">
            <label>文字の太さ:</label>
            <input type="range" name="text_weight" id="text_weight" min="0" max="10" value="1">
            <span id="text_weight_value">1</span>
        </div>
        <div class="form-group">
            <label>縦軸ラベル:</label>
            <input type="text" name="y_label" value="Quality">
            <input type="color" name="y_color" value="#ff0000">
        </div>

        <div class="form-group">
            <label>横軸ラベル:</label>
            <input type="text" name="x_label" value="Enjoyment">
            <input type="color" name="x_color" value="#00ff00">
        </div>
        <div class="form-group">
            <label>背景画像:</label>
            <input type="file" name="bg_file">
        </div>
        <div class="form-group">
            <label>画像を選択:</label>
            <input type="file" name="images" multiple>
        </div>
        <button type="submit">Tier表を生成</button>
    </form>

    {% if img_data %}
        <h2>生成結果:</h2>
        <img src="data:image/png;base64,{{ img_data }}" class="preview">
        <br>
        <a href="data:image/png;base64,{{ img_data }}" download="tier_list.png">
            <button>画像をダウンロード</button>
        </a>
    {% endif %}
    <script>
        const weightInput = document.getElementById('text_weight');
        const weightValue = document.getElementById('text_weight_value');
        weightInput.addEventListener('input', () => {
            weightValue.textContent = weightInput.value;
        });
    </script>
</body>
</html>

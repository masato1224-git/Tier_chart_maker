<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Tier Chart Maker - 画像配置</title>
    <style>
        body { font-family: sans-serif; max-width: 1000px; margin: 0 auto; padding: 20px; background: #f0f2f5; }
        .container { display: flex; gap: 20px; }
        .form-section { flex: 1; }
        .preview-section { flex: 1; }
        .form-group { margin-bottom: 15px; padding-bottom: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="file"] { padding: 8px; }
        button { padding: 10px 20px; font-size: 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #45a049; }
        button.secondary { background: #2196F3; }
        button.secondary:hover { background: #0b7dda; }
        .preview { border: 2px solid #333; max-width: 100%; margin-top: 10px; }
        .image-list { margin-top: 20px; }
        .image-item { background: white; padding: 10px; margin: 5px 0; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .image-item button { margin: 0; padding: 5px 10px; font-size: 12px; }
        h1 { color: #333; }
        .info { background: #e3f2fd; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>Tier表メーカー - ステップ2: 画像配置</h1>
    
    <div class="container">
        <div class="form-section">
            <div class="info">
                設定が完了しました。<br>
                次に、Tier表に置く画像を1つずつ追加してください。
                
            </div>
            
            <form method="POST" action="{{ url_for('place_images') }}" enctype="multipart/form-data" id="imageForm">
                <div class="form-group">
                    <label>画像を選択:</label>
                    <input type="file" name="image" accept="image/*" id="imageInput">
                    <p style="font-size: 12px; color: #666;">※ファイル名は半角英数字のみで構成されたものを指定してください</p>
                </div>
                
                <div class="form-group" id="yAxisLabelsSection" style="display: none;">
                    <label>縦軸ラベル (行数: <span id="numRowsDisplay">0</span>):</label>
                    <textarea name="y_axis_labels" id="yAxisLabels" style="width: 100%; height: 120px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace;"></textarea>
                    <p style="font-size: 12px; color: #666;">※1行ずつ改行で区切って入力してください。画像の行数に合わせて表示されます。</p>
                    <button type="submit" class="secondary" style="background: #4CAF50;">ラベルを更新</button>
                </div>
                
                <button type="submit" class="secondary">画像を追加</button>
                <button type="button" id="newlineBtn" class="secondary" style="background: #ff9800;">改行</button>
            </form>
            
            <div class="image-list">
                <h3>追加済み画像 ({{ image_count }}個)</h3>
                <div id="imageListContainer">
                    <!-- 動的に追加 -->
                  
                </div>
                  <p style="font-size: 12px; color: #666;">※タイトルや縦軸、横軸の設定をやり直したい場合は、画像を追加する前に画面を下にスクロールして、「最初からやり直す」からやり直してください。</p>
                
            </div>
            
            <form action="{{ url_for('position_image') }}" method="GET">
                <button type="submit" style="background: #ff9800;">次へ → 位置指定で画像追加</button>
            </form>
            
            <form action="{{ url_for('index') }}" style="margin-top: 20px;">
                <button type="submit" style="background: #f44336;">最初からやり直す</button>
            </form>
        </div>
        
        <div class="preview-section">
            <h3>プレビュー</h3>
            <img src="/preview_image" class="preview" alt="プレビュー">
            <p style="font-size: 12px; color: #666;">※ 実際のTier表です。画像を追加するたびに更新されます。</p>
        </div>
    </div>
    
    <script>
        // ページロード時に画像リストを表示
        const numRows = {{ num_rows }};
        const yAxisLabels = {{ y_axis_labels | tojson }};
        const yAxisStyle = '{{ y_axis_style }}';
        
        document.addEventListener('DOMContentLoaded', () => {
            updateImageList();
            initializeYAxisLabels();
        });
        
        function initializeYAxisLabels() {
            const section = document.getElementById('yAxisLabelsSection');
            const textarea = document.getElementById('yAxisLabels');
            const display = document.getElementById('numRowsDisplay');
            
            display.textContent = numRows;
            textarea.value = yAxisLabels.join('\n');
            section.style.display = yAxisStyle === 'text' ? 'block' : 'none';
        }
        
        // 画像追加フォーム送信
        document.getElementById('imageForm').addEventListener('submit', (e) => {
            const fileInput = document.getElementById('imageInput');
            // ファイル選択時のみチェック（ラベル更新の場合はスキップ）
            if (fileInput.files.length === 0 && e.submitter.textContent === '画像を追加') {
                e.preventDefault();
                alert('画像を選択してください');
                return;
            }
        });
        
        function updateImageList() {
            // サーバーから画像リスト情報を取得して表示
            fetch('/api/image_list')
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('imageListContainer');
                    container.innerHTML = '';
                    data.images.forEach((img, idx) => {
                        const item = document.createElement('div');
                        item.className = 'image-item';
                        item.innerHTML = `<span>${img}</span><button type="button" onclick="removeImage(${idx})" class="secondary">削除</button>`;
                        container.appendChild(item);
                    });
                });
            
            // y_axis_infoも更新
            updateYAxisInfo();
        }
        
        function updateYAxisInfo() {
            fetch('/api/y_axis_info')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('numRowsDisplay').textContent = data.num_rows;
                    document.getElementById('yAxisLabels').value = data.y_axis_labels.join('\n');
                    if (yAxisStyle === 'text') {
                        document.getElementById('yAxisLabelsSection').style.display = 'block';
                    } else {
                        document.getElementById('yAxisLabelsSection').style.display = 'none';
                    }
                });
        }
        
        function updatePreview() {
            // プレビュー画像を再読込
            const img = document.querySelector('.preview');
            if (img) {
                img.src = '/preview_image?' + new Date().getTime();
            }
        }
        
        // 改行ボタンの処理
        document.getElementById('newlineBtn').addEventListener('click', function() {
            fetch('/api/add_newline', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        updateImageList();
                        updatePreview();
                    }
                });
        });
        
        function removeImage(idx) {
            fetch(`/api/remove_image/${idx}`, { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        updateImageList();
                        updatePreview();
                    }
                });
        }
    </script>
</body>
</html>
